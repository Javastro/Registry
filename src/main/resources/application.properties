quarkus.application.name=Registry

# registry related
ivoa.registry.baseAddress=http://localhost:8080/
ivoa.registry.authority=authority.changeme
ivoa.dc.organizationName=Organization
ivoa.dc.contactName=Contact Name
ivoa.dc.contactAddress=Contact Address
ivoa.dc.contactEmail=Contact E-mail.
ivoa.dc.contactTelephone=Contact Telephone number


quarkus.http.port=8080
quarkus.http.test-port=8085
quarkus.jackson.serialization-inclusion=non_empty

quarkus.qute.suffixes=xml,html,txt,qute.html,qute.txt

#quarkus.config.log.values=true
#quarkus.log.category."io.smallrye.config".level=DEBUG

# Enable Basic Auth
quarkus.http.auth.basic=true

# Security  - see https://quarkus.io/guides/security-properties
quarkus.security.users.embedded.enabled=true
#cannot combine plain text passwords with realm change
#passwords generated with `echo -n username:realm:password | md5`
#
quarkus.security.users.embedded.plain-text=true
#plain text passwords easier to update at run time
#quarkus.security.users.embedded.realm-name=RegistryAdmin

#actual password below
# at runtime set
# QUARKUS_SECURITY_USERS_EMBEDDED_USERS__admin__ = betterpassword
quarkus.security.users.embedded.users."admin"=passwordchangeme
quarkus.security.users.embedded.roles."admin"=update

#image build
quarkus.container-image.builder=docker
quarkus.container-image.name=publishing-registry
quarkus.container-image.group=javastro
quarkus.container-image.tag=latest

# pull-policy never for local (minikube etc.) auto-deployment
quarkus.kubernetes.image-pull-policy=Never
%prod.quarkus.kubernetes.image-pull-policy=Always
quarkus.container-image.push=false

#Change this for deployment at build time (could do with a k8s specific build so it will always build even if a docker service isn't running).
quarkus.kubernetes.deploy=false

#Change this for deployment at build time.
quarkus.container-image.build=true

#rest interface
quarkus.swagger-ui.always-include=true
#trying to get schema types in the ui in the included jar...
quarkus.swagger-ui.deep-linking=true
quarkus.swagger-ui.theme=flattop
mp.openapi.extensions.smallrye.operationIdStrategy=CLASS_METHOD
mp.openapi.extensions.smallrye.duplicateOperationIdBehavior=FAIL

#graphql
quarkus.smallrye-graphql.ui.always-include=true

quarkus.rest-client.logging.scope=all
quarkus.rest-client.logging.body-limit=5000
quarkus.rest-client.extensions-api.scope=all
quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=DEBUG
quarkus.log.console.level=DEBUG

quarkus.banner.enabled=false
quarkus.analytics.disabled=true

# RofR (Registry of Registries) harvesting
# Set ivoa.harvesting.rofr.cron to a cron expression (e.g. "0 0 * * * ?") to enable scheduled harvesting
ivoa.harvesting.rofr.url=http://rofr.ivoa.net/oai
ivoa.harvesting.rofr.cron=off

# Recursive source discovery settings
# Whether to discover child registries from harvested resource records
ivoa.harvesting.discovery.enabled=true
# Maximum total number of sources (including seed) that will be persisted
ivoa.harvesting.discovery.max-sources=50
# Maximum hop distance from the seed (0 = seed only, 1 = direct children, …)
ivoa.harvesting.discovery.max-depth=3
# Maximum number of new sources accepted in a single harvest run
ivoa.harvesting.discovery.max-per-run=5

#force inclusion of ivoa entities
quarkus.index-dependency.ivoaent.group-id=org.javastro.ivoa
quarkus.index-dependency.ivoaent.artifact-id=ivoa-entities


quarkus.test.exclude-tags=integration